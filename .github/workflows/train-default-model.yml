name: Train Clickbait Model (Defaults)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read

jobs:
  train-default-model:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Cache Hugging Face assets
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train with default settings
        run: python src/models/train_clickbait.py

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: phobert-clickbait-default-model
          path: results/models/phobert_clickbait
          if-no-files-found: error
